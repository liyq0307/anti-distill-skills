display_name: Anti-Distill
short_description: Sanitize skills and tacit workflow docs while keeping a professional shell. 清洗技能和隐性流程文档，同时保留专业外壳。
default_prompt: Sanitize this document with medium intensity, preserve structure, and generate a private backup of removed leverage. 用中等强度清洗这份文档，保留结构，并生成被抽离杠杆内容的私人备份。
